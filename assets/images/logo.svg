<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tennis Racquet Outline -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Handle -->
    <line x1="100" y1="140" x2="100" y2="190"/>

    <!-- Neck -->
    <line x1="100" y1="140" x2="100" y2="100"/>

    <!-- Head (circle) -->
    <circle cx="100" cy="60" r="40"/>

    <!-- String pattern (cross) -->
    <line x1="70" y1="60" x2="130" y2="60"/>
    <line x1="100" y1="30" x2="100" y2="90"/>

    <!-- Additional string lines for detail -->
    <line x1="75" y1="35" x2="125" y2="85"/>
    <line x1="125" y1="35" x2="75" y2="85"/>
  </g>

  <!-- Ball accent -->
  <circle cx="145" cy="35" r="8" fill="white" opacity="0.9"/>
  <circle cx="145" cy="35" r="6" fill="none" stroke="white" stroke-width="1"/>
</svg>