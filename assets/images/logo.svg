<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Container -->
  <defs>
    <linearGradient id="darkBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FACC15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAB308;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#darkBlueGrad)" stroke="white" stroke-width="2"/>

  <!-- Tennis Racket -->
  <g transform="translate(50, 60)">
    <!-- Handle -->
    <rect x="8" y="40" width="4" height="30" fill="url(#yellowGrad)" rx="2"/>
    <!-- Throat -->
    <path d="M 10 40 Q 15 35 20 40" stroke="url(#yellowGrad)" stroke-width="2" fill="none"/>
    <!-- Head -->
    <circle cx="15" cy="20" r="16" fill="none" stroke="url(#yellowGrad)" stroke-width="2.5"/>
    <!-- String pattern -->
    <line x1="5" y1="20" x2="25" y2="20" stroke="url(#yellowGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="15" x2="27" y2="25" stroke="url(#yellowGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="25" x2="27" y2="15" stroke="url(#yellowGrad)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Tennis Ball -->
  <g transform="translate(110, 90)">
    <!-- Main ball -->
    <circle cx="0" cy="0" r="18" fill="url(#yellowGrad)"/>
    <!-- Tennis ball curves -->
    <path d="M -8 -12 Q -5 -18 0 -18 Q 5 -18 8 -12" stroke="#1E3A8A" stroke-width="1.5" fill="none"/>
    <path d="M -8 12 Q -5 18 0 18 Q 5 18 8 12" stroke="#1E3A8A" stroke-width="1.5" fill="none"/>
    <!-- Seam detail -->
    <path d="M 0 -18 Q 8 0 0 18" stroke="#1E3A8A" stroke-width="1" fill="none"/>
  </g>

  <!-- Text: LEVEL TENNIS -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="1">LEVEL</text>
  <text x="100" y="192" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#FACC15" letter-spacing="2">TENNIS</text>
</svg>