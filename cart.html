<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Level Tennis</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="assets/images/logo.svg" alt="Level Tennis" class="logo-icon">
        <span>Level Tennis</span>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="products.html" class="nav-link">Shop</a></li>
        <li><a href="cart.html" class="nav-link active">Cart <span class="cart-count" id="cart-count">0</span></a></li>
        <li id="nav-auth">
          <a href="login.html" class="nav-link">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Cart Page -->
  <div class="cart-page">
    <div class="container">
      <h1>Shopping Cart</h1>

      <div class="cart-content" id="cart-content">
        <!-- Cart items loaded by JavaScript -->
      </div>

      <div class="cart-summary" id="cart-summary" style="display: none;">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (5%):</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">$0.00</span>
        </div>
        <button class="btn btn-primary btn-lg" id="checkout-btn">Proceed to Checkout</button>
        <a href="products.html" class="btn btn-secondary">Continue Shopping</a>
      </div>

      <div class="empty-cart" id="empty-cart" style="display: none;">
        <p>Your cart is empty</p>
        <a href="products.html" class="btn btn-primary">Start Shopping</a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Level Tennis. All rights reserved.</p>
      <p>Crafted for learning the Braze SDK</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/events.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
