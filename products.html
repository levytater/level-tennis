<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Level Tennis</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/braze-config.js"></script>
  <script src="https://js.appboycdn.com/web-sdk/4.10/braze.min.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="assets/images/logo.svg" alt="Level Tennis" class="logo-icon">
        <span>Level Tennis</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="products.html" class="nav-link active">Shop</a></li>
        <li><a href="cart.html" class="nav-link">Cart <span class="cart-count" id="cart-count">0</span></a></li>
        <li id="nav-auth">
          <a href="login.html" class="nav-link">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Products Page -->
  <div class="products-page">
    <div class="container">
      <h1>Our Products</h1>

      <!-- Filters -->
      <div class="filters">
        <h3>Filter by Category</h3>
        <div class="filter-buttons">
          <button class="filter-btn active" data-category="all">All Products</button>
          <button class="filter-btn" data-category="rackets">Rackets (10)</button>
          <button class="filter-btn" data-category="bags">Bags (6)</button>
          <button class="filter-btn" data-category="strings">Strings (6)</button>
          <button class="filter-btn" data-category="grips">Grips (6)</button>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="product-grid" id="products-grid">
        <!-- Products loaded by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Level Tennis. All rights reserved.</p>
      <p>Crafted for learning the Braze SDK</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/events.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
